name: Publish match result

on:
  workflow_dispatch:
    inputs:
      match_id:
        description: Match number (Summary column J)
        required: true
        type: number
      home_score:
        description: Home team score (Summary column L)
        required: true
        type: number
      away_score:
        description: Away team score (Summary column M)
        required: true
        type: number
  repository_dispatch:
    types: [update-score, restore-score]

concurrency:
  group: toto-data-writes
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          # ubuntu-24.04 runners ship libreoffice-core; core-nogui conflicts with it
          sudo apt-get install -y libreoffice-calc dbus-x11 xvfb
          soffice --version || libreoffice --version

      - name: Resolve inputs
        id: inputs
        env:
          EVENT_ACTION: ${{ github.event.action }}
          DISPATCH_MATCH: ${{ github.event.client_payload.matchId }}
          DISPATCH_HOME: ${{ github.event.client_payload.home }}
          DISPATCH_AWAY: ${{ github.event.client_payload.away }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=publish" >> "$GITHUB_OUTPUT"
            echo "match_id=${{ inputs.match_id }}" >> "$GITHUB_OUTPUT"
            echo "home_score=${{ inputs.home_score }}" >> "$GITHUB_OUTPUT"
            echo "away_score=${{ inputs.away_score }}" >> "$GITHUB_OUTPUT"
          else
            if [ "$EVENT_ACTION" = "restore-score" ]; then
              echo "action=restore" >> "$GITHUB_OUTPUT"
            else
              echo "action=publish" >> "$GITHUB_OUTPUT"
            fi
            echo "match_id=${DISPATCH_MATCH}" >> "$GITHUB_OUTPUT"
            echo "home_score=${DISPATCH_HOME}" >> "$GITHUB_OUTPUT"
            echo "away_score=${DISPATCH_AWAY}" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing match ${DISPATCH_MATCH:-${{ inputs.match_id }}} as ${DISPATCH_HOME:-${{ inputs.home_score }}}-${DISPATCH_AWAY:-${{ inputs.away_score }}}"

      - name: Refresh latest state
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Smoke test LibreOffice recalc
        env:
          HOME: /tmp
          SAL_USE_VCLPLUGIN: gen
        run: |
          cp "xlsx/Master WorldCup26.xlsx" /tmp/wc26-smoke.xlsx
          PYTHONPATH=. python3 -c "
          import openpyxl
          from pathlib import Path
          path = Path('/tmp/wc26-smoke.xlsx')
          wb = openpyxl.load_workbook(path)
          ws = wb['Summary']
          for row in range(4, 120):
              if ws[f'J{row}'].value and ws[f'K{row}'].value and '-' in str(ws[f'K{row}'].value):
                  ws[f'L{row}'].value = None
                  ws[f'M{row}'].value = None
          wb.save(path)
          "
          PYTHONPATH=. python3 scripts/libreoffice_recalc.py /tmp/wc26-smoke.xlsx

      - name: Patch match score
        env:
          HOME: /tmp
          SAL_USE_VCLPLUGIN: gen
        run: |
          if [ "${{ steps.inputs.outputs.action }}" = "restore" ]; then
            PYTHONPATH=. python3 -u scripts/publish_match.py \
              "${{ steps.inputs.outputs.match_id }}" \
              --restore
            exit 0
          fi
          # close_live defaults to false — live ends only via admin Stop
          PYTHONPATH=. python3 -u scripts/publish_match.py \
            "${{ steps.inputs.outputs.match_id }}" \
            "${{ steps.inputs.outputs.home_score }}" \
            "${{ steps.inputs.outputs.away_score }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xlsx/Master\ WorldCup26.xlsx public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          if [ "${{ steps.inputs.outputs.action }}" = "restore" ]; then
            git commit -m "Results: Restore match ${{ steps.inputs.outputs.match_id }}"
          else
            git commit -m "Results: Match ${{ steps.inputs.outputs.match_id }} — ${{ steps.inputs.outputs.home_score }}-${{ steps.inputs.outputs.away_score }}"
          fi
          git push
