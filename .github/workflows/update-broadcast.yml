name: Update live broadcast

on:
  workflow_dispatch:
    inputs:
      action:
        description: set | suppress_auto | resume_auto | clear_manual
        required: true
        default: set
      open_match_ids:
        description: Comma-separated match ids (max 2)
        required: false
        default: ""
  repository_dispatch:
    types: [update-broadcast]

concurrency:
  group: toto-data-writes
  cancel-in-progress: false

jobs:
  broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-calc dbus-x11 xvfb
          soffice --version || libreoffice --version

      - name: Resolve inputs
        id: inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          INPUT_ACTION: ${{ inputs.action }}
          INPUT_OPEN_IDS: ${{ inputs.open_match_ids }}
        run: |
          python3 <<'PY'
          import json
          import os

          def write_output(name, value):
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
                  output.write(f"{name}={value}\n")

          if os.environ["EVENT_NAME"] == "workflow_dispatch":
              write_output("action", os.environ.get("INPUT_ACTION", "set"))
              write_output("open_match_ids", os.environ.get("INPUT_OPEN_IDS", ""))
              write_output("open_json", "")
              write_output("suppress", "")
          else:
              payload = json.loads(os.environ.get("DISPATCH_PAYLOAD") or "{}")
              open_ids = payload.get("openMatchIds")
              suppress = payload.get("suppressAuto")

              write_output("action", str(payload.get("action") or "set"))
              write_output("open_match_ids", "")
              write_output("open_json", json.dumps(open_ids) if isinstance(open_ids, list) else "")
              write_output("suppress", "" if suppress is None else str(bool(suppress)).lower())
          PY

      - name: Refresh latest state
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Update broadcast in latest.json
        env:
          ACTION: ${{ steps.inputs.outputs.action }}
          OPEN_IDS: ${{ steps.inputs.outputs.open_match_ids }}
          OPEN_JSON: ${{ steps.inputs.outputs.open_json }}
          SUPPRESS: ${{ steps.inputs.outputs.suppress }}
        run: |
          PYTHONPATH=. python3 <<'PY'
          import json
          import os
          from pathlib import Path
          from scripts.publish_match import publish_match
          from scripts.update_broadcast import update_broadcast

          action = os.environ.get("ACTION", "set").strip().lower()
          open_json = os.environ.get("OPEN_JSON", "").strip()
          open_ids = None
          if open_json:
              open_ids = [int(v) for v in json.loads(open_json)]
          else:
              raw = os.environ.get("OPEN_IDS", "").strip()
              if raw:
                  open_ids = [int(v) for v in raw.split(",") if v.strip()]

          suppress = os.environ.get("SUPPRESS", "").strip()
          suppress_auto = None
          if suppress != "":
              suppress_auto = suppress.lower() in ("1", "true", "yes")

          current_open_ids = set()
          latest_path = Path("public/data/latest.json")
          if latest_path.exists():
              latest = json.loads(latest_path.read_text(encoding="utf-8"))
              broadcast = latest.get("broadcast")
              if isinstance(broadcast, dict):
                  for value in broadcast.get("openMatchIds") or []:
                      try:
                          current_open_ids.add(int(value))
                      except (TypeError, ValueError):
                          continue

          if action == "set" and open_ids is not None:
              for match_id in open_ids:
                  if match_id not in current_open_ids:
                      publish_match(match_id, 0, 0, close_live=False)

          if action == "resume_auto":
              update_broadcast(open_match_ids=[], suppress_auto=False, mode="auto", clear_manual=True)
          elif action == "suppress_auto":
              update_broadcast(suppress_auto=True)
          elif action == "clear_manual":
              update_broadcast(clear_manual=True)
          else:
              update_broadcast(open_match_ids=open_ids, suppress_auto=suppress_auto)
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xlsx/Master\ WorldCup26.xlsx public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Broadcast: ${{ steps.inputs.outputs.action }}"
          git push
