name: Update registration

on:
  workflow_dispatch:
    inputs:
      users:
        description: Comma-separated player names
        required: true
        default: ""
  repository_dispatch:
    types: [update-registration]

concurrency:
  group: update-registration
  cancel-in-progress: false

jobs:
  registration:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update registration in latest.json
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_USERS: ${{ inputs.users }}
        run: |
          PYTHONPATH=. python3 <<'PY'
          import json
          import os
          from scripts.update_registration import update_registration

          event_name = os.environ.get("EVENT_NAME", "")

          if event_name == "workflow_dispatch":
              raw = os.environ.get("INPUT_USERS", "").strip()
              users = [part.strip() for part in raw.split(",") if part.strip()]
          else:
              event_path = os.environ.get("GITHUB_EVENT_PATH", "")
              if not event_path:
                  raise SystemExit("GITHUB_EVENT_PATH is missing")
              with open(event_path, encoding="utf-8") as handle:
                  event = json.load(handle)
              users_raw = (event.get("client_payload") or {}).get("users")
              if not isinstance(users_raw, list):
                  raise SystemExit("repository_dispatch payload must include a users list")
              users = [str(name).strip() for name in users_raw if str(name).strip()]

          payload = update_registration(users)
          reg = payload["registration"]
          print(f"Saved {reg['count']} player(s), prize pool ${reg['prizePool']:,}")
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Registration: update player list"
          git push
