name: Auto-start kickoff matches

on:
  schedule:
    # Every 5 minutes (UTC) — catches night kickoffs without admin play
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: toto-data-writes
  cancel-in-progress: false

jobs:
  kickoff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-calc dbus-x11 xvfb
          soffice --version || libreoffice --version

      - name: Refresh latest state
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Auto-start matches at kickoff
        run: PYTHONPATH=. python3 scripts/auto_start_kickoff.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xlsx/Master\ WorldCup26.xlsx public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-start: kickoff 0-0 in xlsx"
          git push
