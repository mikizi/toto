name: Auto-start kickoff matches

on:
  schedule:
    # Every 5 minutes (UTC) — catches night kickoffs without admin play
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: toto-data-writes
  cancel-in-progress: false

jobs:
  kickoff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Refresh latest state
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Detect LibreOffice need
        id: lo
        run: |
          needed=$(PYTHONPATH=. python3 scripts/ci_needs_libreoffice.py kickoff-schedule)
          echo "needed=$needed" >> "$GITHUB_OUTPUT"
          echo "LibreOffice needed: $needed"

      - name: Setup Python and LibreOffice
        if: steps.lo.outputs.needed == 'true'
        uses: ./.github/actions/setup-toto-ci
        with:
          libreoffice: "true"

      - name: Auto-start matches at kickoff
        if: steps.lo.outputs.needed == 'true'
        run: PYTHONPATH=. python3 scripts/auto_start_kickoff.py

      - name: Commit and push
        if: steps.lo.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xlsx/Master\ WorldCup26.xlsx public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-start: kickoff 0-0 in xlsx"
          git push
