name: Setup Toto CI
description: Cached pip deps and optional LibreOffice Calc for data workflows

inputs:
  libreoffice:
    description: Install LibreOffice (set false to skip apt when only JSON changes)
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip

    - name: Install Python dependencies
      shell: bash
      run: pip install -r requirements.txt

    - name: Cache apt packages
      if: inputs.libreoffice == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/apt-cache
        key: ${{ runner.os }}-libreoffice-apt-v1
        restore-keys: |
          ${{ runner.os }}-libreoffice-apt-

    - name: Install LibreOffice
      if: inputs.libreoffice == 'true'
      shell: bash
      run: |
        set -euo pipefail
        sudo mkdir -p /etc/apt/apt.conf.d
        echo "Dir::Cache::Archives \"$HOME/apt-cache/archives\";" | sudo tee /etc/apt/apt.conf.d/99toto-apt-cache
        mkdir -p "$HOME/apt-cache/archives/partial"
        sudo apt-get update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
          libreoffice-calc dbus-x11 xvfb
        soffice --version || libreoffice --version
